name: Hourly Website Sync

on:
  workflow_run:
    workflows: ["Hourly Alarm Trigger"]
    types:
      - completed
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Website Assets Recursively
        run: |
          # Dynamically assemble the URL to prevent interface formatting bugs
          DOMAIN="www.sci.brooklyn.cuny.edu"
          USER_PATH="~briskman"
          FULL_TARGET="https://${DOMAIN}/${USER_PATH}"

          # Create temporary download area
          TEMP_DIR="/tmp/site-sync"
          rm -rf "$TEMP_DIR"
          mkdir -p "$TEMP_DIR"

          # 1. Download root file
          wget -nH --cut-dirs=1 "${FULL_TARGET}/index.html" -O index.html

          # 2. Download folders recursively
          wget -r -nH --cut-dirs=1 --no-parent --reject-regex='\?C=' -P "$TEMP_DIR" -R 'CISC_3350_OER_Course_Packet.pdf,Lumen-Learning-Computer-Applications-for-Managers.pdf' "${FULL_TARGET}/cisc/"
          wget -r -nH --cut-dirs=1 --no-parent --reject-regex='\?C=' -P "$TEMP_DIR" "${FULL_TARGET}/guides/"
          wget -r -nH --cut-dirs=1 --no-parent --reject-regex='\?C=' -P "$TEMP_DIR" "${FULL_TARGET}/static/"

          # Merge into repository
          rsync -a "$TEMP_DIR/" .

          # Remove temporary files
          rm -rf "$TEMP_DIR"

      - name: Fix Parent Directory Links for GitHub Pages
        run: |
          # Find all index.html files inside the folders
          # If a line contains "Parent Directory" or "[PARENTDIR]", replace /~briskman/ with /teaching/
          find cisc guides static -name "index.html" -type f -exec sed -i '/Parent Directory\|\[PARENTDIR\]/s|/~briskman/|/teaching/|g' {} +

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Automated Sync: Updated static, cisc, guides, and index.html assets"
            git push
          else
            echo "No changes found on the server. Skipping commit."
          fi
