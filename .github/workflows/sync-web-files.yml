name: Hourly Website Sync

on:
  workflow_run:
    workflows: ["Hourly Alarm Trigger"]
    types:
      - completed
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore Git file timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Verify restored timestamp
        run: |
          stat cisc/3320/lecture_notes/topic_10/07.html

      - name: Download Website Assets Recursively
        run: |
          # Dynamically assemble the URL to prevent interface formatting bugs
          DOMAIN="www.sci.brooklyn.cuny.edu"
          USER_PATH="~briskman"
          FULL_TARGET="https://${DOMAIN}/${USER_PATH}"

          # 1. Download root file
          wget -N -nH --cut-dirs=1 "${FULL_TARGET}/index.html"

          # 2. Download folders recursively
          wget -N -r -nH --cut-dirs=1 --no-parent --reject-regex='\?C=' "${FULL_TARGET}/cisc/" || true
          wget -N -r -nH --cut-dirs=1 --no-parent --reject-regex='\?C=' "${FULL_TARGET}/guides/" || true
          wget -N -r -nH --cut-dirs=1 --no-parent --reject-regex='\?C=' "${FULL_TARGET}/static/" || true

      - name: Fix Parent Directory Links for GitHub Pages
        run: |
          # Find all index.html files inside the folders
          # If a line contains "Parent Directory" or "[PARENTDIR]", replace /~briskman/ with /teaching/
          find cisc guides static -name "index.html" -type f -exec sed -i '/Parent Directory\|\[PARENTDIR\]/s|/~briskman/|/teaching/|g' {} +

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Automated Sync: Updated static, cisc, guides, and index.html assets"
            git push
          else
            echo "No changes found on the server. Skipping commit."
          fi
