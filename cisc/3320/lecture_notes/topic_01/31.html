        <h3>Privileges</h3>
 
        <div class = "imagecontainer" style = "margin-top: 5vh;">
            <a href = "https://www.researchgate.net/profile/Ruben-Van-Den-Bossche/publication/235953591/figure/fig1/AS:393354564128768@1470794444459/The-x86-privilege-level-architecture.png" target='_blank'><img src="privilege-levels.png" title = "Privilege rings: from the most privileged to the least." alt="Privilege rings: from the most privileged to the least. Ring 0 is the innermost circle inside the diagram, and represents the most sensitive permissions; these permissions are granted to the Operating System's kernel. Since it is the innermost circle, it is the smallest one, meaning that such permissions aren't given to most users. Above this ring are several more, outer rings, listed as Ring 1, Ring 2, etc., each representing less and less sensitive privileges given to users. Ring 1 and 2 permissions are granted to programs running on behalf of the operating system (a.k.a., 'operating system services'). The outermost ring stands for the most common rights given to a computer user and user applications." style = "width: 40vw;"></a>
            <p class = "caption" style = "width: 40vw;">Taken from <a href = "https://www.researchgate.net/figure/The-x86-privilege-level-architecture_fig1_235953591" title = "The-x86-privilege-level-architecture.png diagram on Research Gate (website)" target='_blank'>https://<wbr>www.researchgate.net<wbr>/figure<wbr>/The-x86-privilege-level-architecture<wbr>_fig1<wbr>_235953591</a>.</p>
